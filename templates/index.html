<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pickle Court Booker</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
	<style>
		.password-note {
			position: fixed;
			right: 1rem;
			bottom: 1rem;
			padding: 0.7rem 0.9rem;
			border-radius: 0.6rem;
			background: rgba(17, 25, 40, 0.92);
			color: #f8fafc;
			font-size: 0.9rem;
			box-shadow: 0 10px 30px rgba(15, 23, 42, 0.28);
			z-index: 10;
		}
	</style>
</head>
<body>
	<main class="container">
		<h1>Book a Pickleball Court</h1>
		{% if errors %}
			<article class="contrast">
				<ul>
					{% for e in errors %}
						<li>{{ e }}</li>
					{% endfor %}
				</ul>
			</article>
		{% endif %}

		<form method="post" action="{{ url_for('book') }}">
			<div class="grid">
				<label>
					Day
					<select name="day" required>
						{% set selected_day = (form.day if form else '') %}
						{% for d in ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'] %}
							<option value="{{ d }}" {% if selected_day==d %}selected{% endif %}>{{ d }}</option>
						{% endfor %}
					</select>
				</label>
				<label>
					Court Number
					<input type="number" name="court_number" min="1" max="20" placeholder="e.g., 9" value="{{ (form.court_number if form else '') }}" required />
				</label>
			</div>

			<label>
				Time (as shown on site)
				<input type="text" name="time" placeholder="e.g., 07:30 pm" value="{{ (form.time if form else '') }}" required />
			</label>

			<div class="grid">
				<label>
					Email
					<input type="email" name="email" placeholder="you@example.com" value="{{ (form.email if form else '') }}" required />
				</label>
				<label>
					Password
					<input type="password" name="password" required />
				</label>
			</div>

			<label>
				<input type="checkbox" name="headless" checked />
				Run headless (no browser window)
			</label>

			<button type="submit">Book Now</button>
		</form>
	</main>
	<div class="password-note">PickleBall1</div>
</body>
</html>
